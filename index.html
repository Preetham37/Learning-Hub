<!DOCTYPE html>
<html>
    <head>
        <title>Learning Hub</title>
        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    </head>
    <body>
        <header>
            <h1>Learning Hub</h1>
        </header>
        <main>


            <aside class="sideBar">
                <div class="profile">
                    <img class="profileImage" src="images/DODGE.jpg" alt="dodge car image">
                    <div class="profileName">
                        <p>Preetham</p>
                    </div>
                </div>
                <div class="sideBarElements">
                    <a href="todoapp.html">TODO APP</a>
                    <a href="todoapp.html">TODO APP</a>
                </div>
                
            </aside>


            <section class="content">

                 <section class="searchBar">
                    <input type="text" class="searchInput" id="searchInput">
                    <button class="searchButton"><i class="fa fa-search" style="font-size: 16px;"></i></button>
                </section>

                <section class="addNoteButton">
                    <button class="addButton" id="addButton"><i class="fa fa-plus" style="font-size: large; font-weight: 300;"></i>ADD NOTES</button>
                </section>

                <section class="noteContainer">

                    <div class="noteCard">
                        <h2 class="noteTitle">
                            CSS FLEX BOX
                        </h2>
                        <p class="notePreview">
                            i learned how to use flex box in css and it was a fun thing to learn and that is grate that i learn that 
                        </p>
                        <div class="noteFooter">
                            <span class="noteTag">
                                css
                            </span>
                            <span class="favorite">
                                <i class="fa fa-star"></i>
                            </span>
                        </div>

                    </div>
                    <div class="noteCard">2</div>
                    <div class="noteCard">3</div>
                    <div class="noteCard">4</div>
                    <div class="noteCard">5</div>
                    <div class="noteCard">6</div>
                </section>

            </section>
           
        </main>
    </body>
</html>
